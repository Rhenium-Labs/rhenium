services:
     bot:
          container_name: rhenium_bot
          build:
               context: .
               dockerfile: ./applications/bot/Dockerfile
          env_file:
               - ./applications/bot/.env
          volumes:
               - ./applications/bot/cfg.global.yml:/rhenium/applications/bot/cfg.global.yml

     dashboard-server:
          container_name: rhenium_dashboard_server
          build:
               context: .
               dockerfile: ./applications/dashboard3/server/Dockerfile
          env_file:
               - ./applications/dashboard3/server/.env
          ports:
               - "4000:4000"
          healthcheck:
               test: ["CMD", "bun", "-e", "fetch('http://localhost:4000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
               interval: 15s
               timeout: 5s
               retries: 3
               start_period: 10s
          deploy:
               replicas: 1
               update_config:
                    parallelism: 1
                    delay: 10s
                    order: start-first
               restart_policy:
                    condition: on-failure
                    delay: 5s
                    max_attempts: 3

     dashboard-web:
          container_name: rhenium_dashboard_web
          build:
               context: .
               dockerfile: ./applications/dashboard3/web/Dockerfile
               args:
                    VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api/v1}
          ports:
               - "80:80"
          depends_on:
               dashboard-server:
                    condition: service_healthy
          healthcheck:
               test: ["CMD", "wget", "-qO-", "http://localhost/health"]
               interval: 15s
               timeout: 5s
               retries: 3
               start_period: 5s
          deploy:
               replicas: 1
               update_config:
                    parallelism: 1
                    delay: 10s
                    order: start-first
               restart_policy:
                    condition: on-failure
                    delay: 5s
                    max_attempts: 3
